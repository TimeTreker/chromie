      NO_PROXY: ${NO_PROXY:-localhost,127.0.0.1,host.docker.internal,chromie-asr,chromie-tts,chromie-llm,chromie-router,chromie-agent}
      no_proxy: ${NO_PROXY:-localhost,127.0.0.1,host.docker.internal,chromie-asr,chromie-tts,chromie-llm,chromie-router,chromie-agent}
    # Required on Linux when Agent-side probes or runtime calls target a
    # Soridormi MCP server running on the Docker host.
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./capabilities:/app/capabilities:ro
    depends_on:
      chromie-llm:
        condition: service_healthy
    networks:
      - chromie-net
    healthcheck:
      test:
        - CMD-SHELL
        - |
          python - <<'PY'
          import urllib.request
          urllib.request.urlopen("http://127.0.0.1:8092/health", timeout=5).read()
          PY
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s

networks:
  chromie-net:
    driver: bridge
