services:
  chromie-asr:
    container_name: chromie-asr
    build:
      context: ./asr
      args:
        ASR_CUDA_IMAGE: ${ASR_CUDA_IMAGE}
        HTTP_PROXY: ${HTTP_PROXY:-}
        HTTPS_PROXY: ${HTTPS_PROXY:-}
        http_proxy: ${HTTP_PROXY:-}
        https_proxy: ${HTTPS_PROXY:-}
        NO_PROXY: ${NO_PROXY:-localhost,127.0.0.1,host.docker.internal}
        no_proxy: ${NO_PROXY:-localhost,127.0.0.1,host.docker.internal}
    image: chromie-asr:${CHROMIE_IMAGE_TAG:-0.1.0-alpha.1}
    init: true
    restart: unless-stopped
    gpus: all
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    ports:
      - "9001:9001"
    environment:
      ASR_HOST: "0.0.0.0"
      ASR_PORT: "9001"
      ASR_MODEL: ${ASR_MODEL}
      ASR_MODEL_REVISION: ${ASR_MODEL_REVISION}
      ASR_DEVICE: ${ASR_DEVICE}
      ASR_COMPUTE_TYPE: ${ASR_COMPUTE_TYPE}
      ASR_LANGUAGE: ${ASR_LANGUAGE:-}
      ASR_BEAM_SIZE: ${ASR_BEAM_SIZE:-1}
      ASR_VAD_FILTER: ${ASR_VAD_FILTER:-false}
      ASR_CONDITION_ON_PREVIOUS_TEXT: ${ASR_CONDITION_ON_PREVIOUS_TEXT:-false}
      ASR_MAX_CONCURRENT_TRANSCRIPTIONS: ${ASR_MAX_CONCURRENT_TRANSCRIPTIONS:-1}

      NVIDIA_VISIBLE_DEVICES: ${NVIDIA_VISIBLE_DEVICES:-all}
      NVIDIA_DRIVER_CAPABILITIES: ${NVIDIA_DRIVER_CAPABILITIES:-compute,utility}

      HF_HOME: /root/.cache/huggingface
      HUGGINGFACE_HUB_CACHE: /root/.cache/huggingface
      HF_HUB_OFFLINE: ${HF_HUB_OFFLINE:-0}
      TRANSFORMERS_OFFLINE: ${TRANSFORMERS_OFFLINE:-0}
      HF_HUB_DISABLE_TELEMETRY: "1"

      HTTP_PROXY: ${HTTP_PROXY:-}
      HTTPS_PROXY: ${HTTPS_PROXY:-}
      http_proxy: ${HTTP_PROXY:-}
      https_proxy: ${HTTPS_PROXY:-}
      NO_PROXY: ${NO_PROXY:-localhost,127.0.0.1,host.docker.internal,chromie-asr,chromie-tts,chromie-llm,chromie-router,chromie-agent}
      no_proxy: ${NO_PROXY:-localhost,127.0.0.1,host.docker.internal,chromie-asr,chromie-tts,chromie-llm,chromie-router,chromie-agent}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./hf_cache:/root/.cache/huggingface
    networks:
      - chromie-net
    healthcheck:
      test:
        - CMD-SHELL
        - |
          python - <<'PY'
          import asyncio, json, websockets

          async def main():
              async with websockets.connect("ws://127.0.0.1:9001", open_timeout=5) as ws:
                  await ws.send(json.dumps({"type": "health"}))
                  msg = await asyncio.wait_for(ws.recv(), timeout=5)
                  assert json.loads(msg).get("type") == "pong"

          asyncio.run(main())
          PY
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  chromie-tts:
    container_name: chromie-tts
    build:
      context: ./tts
      args:
        TTS_CUDA_IMAGE: ${TTS_CUDA_IMAGE}
        TTS_CUDA_ARCH: ${TTS_CUDA_ARCH}
        HTTP_PROXY: ${HTTP_PROXY:-}
        HTTPS_PROXY: ${HTTPS_PROXY:-}
        http_proxy: ${HTTP_PROXY:-}
        https_proxy: ${HTTPS_PROXY:-}
        NO_PROXY: ${NO_PROXY:-localhost,127.0.0.1,host.docker.internal}
        no_proxy: ${NO_PROXY:-localhost,127.0.0.1,host.docker.internal}
    image: chromie-tts:${CHROMIE_IMAGE_TAG:-0.1.0-alpha.1}
    init: true
    restart: unless-stopped
    gpus: all
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    ports:
      - "5000:5000"
    environment:
      TTS_HOST: "0.0.0.0"
      TTS_PORT: "5000"
      TTS_MODEL_SIZE: ${TTS_MODEL_SIZE}
      TTS_TOKENIZER_REPO: ${TTS_TOKENIZER_REPO}
      TTS_TOKENIZER_REVISION: ${TTS_TOKENIZER_REVISION}
      TTS_GGUF_REPO: ${TTS_GGUF_REPO}
      TTS_GGUF_REVISION: ${TTS_GGUF_REVISION}
      TTS_QUANTIZATION: ${TTS_QUANTIZATION}
      TTS_N_GPU_LAYERS: ${TTS_N_GPU_LAYERS}
      TTS_CONTEXT_SIZE: ${TTS_CONTEXT_SIZE}
      TTS_MAX_LENGTH: ${TTS_MAX_LENGTH}
      TTS_N_BATCH: ${TTS_N_BATCH}
      TTS_THREADS: ${TTS_THREADS}
      TTS_SAMPLE_RATE: ${TTS_SAMPLE_RATE}
      TTS_CHUNK_MS: ${TTS_CHUNK_MS}

      TTS_MAX_CONCURRENT_SYNTHESIS: ${TTS_MAX_CONCURRENT_SYNTHESIS:-1}
      TTS_TEMPERATURE: ${TTS_TEMPERATURE:-0.4}
      TTS_REPETITION_PENALTY: ${TTS_REPETITION_PENALTY:-1.1}
      TTS_MIN_TEXT_CHARS: ${TTS_MIN_TEXT_CHARS:-4}
      TTS_MAX_TEXT_CHARS: ${TTS_MAX_TEXT_CHARS:-220}
      TTS_GENERATION_RETRIES: ${TTS_GENERATION_RETRIES:-1}
      TTS_RESET_LLAMA_STATE: ${TTS_RESET_LLAMA_STATE:-1}
      TTS_AUDIO_CODEC_DEVICE: ${TTS_AUDIO_CODEC_DEVICE:-cpu}
      TTS_WORKER_STARTUP_TIMEOUT_SEC: ${TTS_WORKER_STARTUP_TIMEOUT_SEC:-600}

      PYTORCH_CUDA_ALLOC_CONF: ${PYTORCH_CUDA_ALLOC_CONF:-expandable_segments:True}
      NVIDIA_VISIBLE_DEVICES: ${NVIDIA_VISIBLE_DEVICES:-all}
      NVIDIA_DRIVER_CAPABILITIES: ${NVIDIA_DRIVER_CAPABILITIES:-compute,utility}
      GGML_CUDA_DISABLE_GRAPHS: "1"
      TOKENIZERS_PARALLELISM: "false"

      SPEAKER_DIR: /app/speakers
      HF_HOME: /root/.cache/huggingface
      HUGGINGFACE_HUB_CACHE: /root/.cache/huggingface
      HF_HUB_OFFLINE: ${HF_HUB_OFFLINE:-0}
      TRANSFORMERS_OFFLINE: ${TRANSFORMERS_OFFLINE:-0}
      HF_HUB_DISABLE_TELEMETRY: "1"

      HTTP_PROXY: ${HTTP_PROXY:-}
      HTTPS_PROXY: ${HTTPS_PROXY:-}
      http_proxy: ${HTTP_PROXY:-}
      https_proxy: ${HTTPS_PROXY:-}
      NO_PROXY: ${NO_PROXY:-localhost,127.0.0.1,host.docker.internal,chromie-asr,chromie-tts,chromie-llm,chromie-router,chromie-agent}
      no_proxy: ${NO_PROXY:-localhost,127.0.0.1,host.docker.internal,chromie-asr,chromie-tts,chromie-llm,chromie-router,chromie-agent}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./hf_cache:/root/.cache/huggingface
      - ./hf_cache/outeai:/root/.cache/outeai
      - ./tts/speakers:/app/speakers
    networks:
      - chromie-net
    healthcheck:
      test:
        - CMD-SHELL
        - |
          python - <<'PY'
          import asyncio, json, websockets

          async def main():
              async with websockets.connect("ws://127.0.0.1:5000", open_timeout=5) as ws:
                  await ws.send(json.dumps({"type": "health"}))
                  msg = await asyncio.wait_for(ws.recv(), timeout=5)
                  assert json.loads(msg).get("type") == "pong"

          asyncio.run(main())
          PY
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 180s

  chromie-llm:
    container_name: chromie-llm
    image: ${OLLAMA_IMAGE:-ollama/ollama:0.12.10}
    init: true
    restart: unless-stopped
    gpus: all
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    ports:
      - "11434:11434"
    environment:
      OLLAMA_HOST: "0.0.0.0:11434"
      OLLAMA_KEEP_ALIVE: ${OLLAMA_KEEP_ALIVE:-24h}
      OLLAMA_LOAD_TIMEOUT: ${OLLAMA_LOAD_TIMEOUT:-10m}
      OLLAMA_NUM_PARALLEL: ${OLLAMA_NUM_PARALLEL:-1}
      OLLAMA_CONTEXT_LENGTH: ${OLLAMA_CONTEXT_LENGTH:-2048}

      NVIDIA_VISIBLE_DEVICES: ${NVIDIA_VISIBLE_DEVICES:-all}
      NVIDIA_DRIVER_CAPABILITIES: ${NVIDIA_DRIVER_CAPABILITIES:-compute,utility}

      HTTP_PROXY: ${HTTP_PROXY:-}
      HTTPS_PROXY: ${HTTPS_PROXY:-}
      http_proxy: ${HTTP_PROXY:-}
      https_proxy: ${HTTPS_PROXY:-}
      NO_PROXY: ${NO_PROXY:-localhost,127.0.0.1,host.docker.internal,chromie-asr,chromie-tts,chromie-llm,chromie-router,chromie-agent}
      no_proxy: ${NO_PROXY:-localhost,127.0.0.1,host.docker.internal,chromie-asr,chromie-tts,chromie-llm,chromie-router,chromie-agent}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./ollama_data:/root/.ollama
    networks:
      - chromie-net
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "OLLAMA_HOST=http://127.0.0.1:11434 ollama list >/dev/null",
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  chromie-router:
    container_name: chromie-router
    build:
      context: ./router
      args:
        PYTHON_IMAGE: ${PYTHON_IMAGE:-python:3.12.10-slim-bookworm}
        HTTP_PROXY: ${HTTP_PROXY:-}
        HTTPS_PROXY: ${HTTPS_PROXY:-}
        http_proxy: ${HTTP_PROXY:-}
        https_proxy: ${HTTPS_PROXY:-}
        NO_PROXY: ${NO_PROXY:-localhost,127.0.0.1,host.docker.internal}
        no_proxy: ${NO_PROXY:-localhost,127.0.0.1,host.docker.internal}
    image: chromie-router:${CHROMIE_IMAGE_TAG:-0.1.0-alpha.1}
    init: true
    restart: unless-stopped
    ports:
      - "8091:8091"
    environment:
      ROUTER_HOST: "0.0.0.0"
      ROUTER_PORT: "8091"
      ROUTER_USE_LLM: ${ROUTER_USE_LLM:-0}
      ROUTER_OLLAMA_URL: http://chromie-llm:11434
      ROUTER_MODEL: ${ROUTER_MODEL:-qwen3:0.6b}
      ROUTER_TIMEOUT_MS: ${ROUTER_TIMEOUT_MS:-2000}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}

      HTTP_PROXY: ${HTTP_PROXY:-}
      HTTPS_PROXY: ${HTTPS_PROXY:-}
      http_proxy: ${HTTP_PROXY:-}
      https_proxy: ${HTTPS_PROXY:-}
      NO_PROXY: ${NO_PROXY:-localhost,127.0.0.1,host.docker.internal,chromie-asr,chromie-tts,chromie-llm,chromie-router,chromie-agent}
      no_proxy: ${NO_PROXY:-localhost,127.0.0.1,host.docker.internal,chromie-asr,chromie-tts,chromie-llm,chromie-router,chromie-agent}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      chromie-llm:
        condition: service_healthy
    networks:
      - chromie-net
    healthcheck:
      test:
        - CMD-SHELL
        - |
          python - <<'PY'
          import urllib.request
          urllib.request.urlopen("http://127.0.0.1:8091/health", timeout=5).read()
          PY
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s

  chromie-agent:
    container_name: chromie-agent
    build:
      context: .
      dockerfile: agent/Dockerfile
      args:
        PYTHON_IMAGE: ${PYTHON_IMAGE:-python:3.12.10-slim-bookworm}
        HTTP_PROXY: ${HTTP_PROXY:-}
        HTTPS_PROXY: ${HTTPS_PROXY:-}
        http_proxy: ${HTTP_PROXY:-}
        https_proxy: ${HTTPS_PROXY:-}
        NO_PROXY: ${NO_PROXY:-localhost,127.0.0.1,host.docker.internal}
        no_proxy: ${NO_PROXY:-localhost,127.0.0.1,host.docker.internal}
    image: chromie-agent:${CHROMIE_IMAGE_TAG:-0.1.0-alpha.1}
    init: true
    restart: unless-stopped
    ports:
      - "8092:8092"
    environment:
      AGENT_HOST: "0.0.0.0"
      AGENT_PORT: "8092"

      AGENT_USE_LLM: ${AGENT_USE_LLM:-1}
      AGENT_MODEL: ${AGENT_MODEL:-gemma4:e2b}
      AGENT_OLLAMA_URL: http://chromie-llm:11434
      AGENT_TIMEOUT_MS: ${AGENT_TIMEOUT_MS:-30000}

      AGENT_MAX_SPEAK_CHARS: ${AGENT_MAX_SPEAK_CHARS:-160}
      AGENT_INTERACTION_OUTPUT_MODE: ${AGENT_INTERACTION_OUTPUT_MODE:-native}
      AGENT_NATIVE_INTERACTION_FALLBACK: ${AGENT_NATIVE_INTERACTION_FALLBACK:-0}
      AGENT_ENABLE_TASK_GRAPH_PLANNING: ${AGENT_ENABLE_TASK_GRAPH_PLANNING:-0}
      AGENT_ENABLE_READ_ONLY_TASK_GRAPH_EXECUTION: ${AGENT_ENABLE_READ_ONLY_TASK_GRAPH_EXECUTION:-0}
      AGENT_ENABLE_PLANNING_TASK_GRAPH_EXECUTION: ${AGENT_ENABLE_PLANNING_TASK_GRAPH_EXECUTION:-0}
      AGENT_ENABLE_PARALLEL_TASK_GRAPH_EXECUTION: ${AGENT_ENABLE_PARALLEL_TASK_GRAPH_EXECUTION:-0}
      AGENT_TASK_GRAPH_MAX_CONCURRENCY: ${AGENT_TASK_GRAPH_MAX_CONCURRENCY:-4}
      AGENT_ENABLE_GUARDED_TASK_GRAPH_EXECUTION: ${AGENT_ENABLE_GUARDED_TASK_GRAPH_EXECUTION:-0}
      AGENT_ENABLE_PHYSICAL_TASK_GRAPH_EXECUTION: ${AGENT_ENABLE_PHYSICAL_TASK_GRAPH_EXECUTION:-0}
      AGENT_TASK_GRAPH_EXECUTION_TOKEN: ${AGENT_TASK_GRAPH_EXECUTION_TOKEN:-}
      AGENT_TASK_GRAPH_DIAGNOSTICS_TOKEN: ${AGENT_TASK_GRAPH_DIAGNOSTICS_TOKEN:-}
      AGENT_TASK_GRAPH_TRACE_MAX_ENTRIES: ${AGENT_TASK_GRAPH_TRACE_MAX_ENTRIES:-128}
      AGENT_TASK_GRAPH_TRACE_TTL_SEC: ${AGENT_TASK_GRAPH_TRACE_TTL_SEC:-900}
      AGENT_TASK_GRAPH_GRANT_MAX_ENTRIES: ${AGENT_TASK_GRAPH_GRANT_MAX_ENTRIES:-128}
      AGENT_CAPABILITY_MANIFESTS: ${AGENT_CAPABILITY_MANIFESTS:-}
      SORIDORMI_MCP_URL: ${SORIDORMI_MCP_URL:-}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}

      HTTP_PROXY: ${HTTP_PROXY:-}
      HTTPS_PROXY: ${HTTPS_PROXY:-}
      http_proxy: ${HTTP_PROXY:-}
      https_proxy: ${HTTPS_PROXY:-}
      NO_PROXY: ${NO_PROXY:-localhost,127.0.0.1,host.docker.internal,chromie-asr,chromie-tts,chromie-llm,chromie-router,chromie-agent}
      no_proxy: ${NO_PROXY:-localhost,127.0.0.1,host.docker.internal,chromie-asr,chromie-tts,chromie-llm,chromie-router,chromie-agent}
    # Required on Linux when Agent-side probes or runtime calls target a
    # Soridormi MCP server running on the Docker host.
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./capabilities:/app/capabilities:ro
    depends_on:
      chromie-llm:
        condition: service_healthy
    networks:
      - chromie-net
    healthcheck:
      test:
        - CMD-SHELL
        - |
          python - <<'PY'
          import urllib.request
          urllib.request.urlopen("http://127.0.0.1:8092/health", timeout=5).read()
          PY
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s

networks:
  chromie-net:
    driver: bridge
