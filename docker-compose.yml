services:
  chromie-asr:
    container_name: chromie-asr
    build:
      context: ./asr
      args:
        ASR_CUDA_IMAGE: ${ASR_CUDA_IMAGE}
        HTTP_PROXY: ${HTTP_PROXY:-}
        HTTPS_PROXY: ${HTTPS_PROXY:-}
        http_proxy: ${HTTP_PROXY:-}
        https_proxy: ${HTTPS_PROXY:-}
        NO_PROXY: ${NO_PROXY:-localhost,127.0.0.1,host.docker.internal}
        no_proxy: ${NO_PROXY:-localhost,127.0.0.1,host.docker.internal}
    image: chromie-asr:${CHROMIE_IMAGE_TAG:?CHROMIE_IMAGE_TAG must be set}
    init: true
    restart: unless-stopped
    gpus: all
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    ports:
      - "9001:9001"
    environment:
      CHROMIE_ACTIVE_PROFILE: ${CHROMIE_ACTIVE_PROFILE:?CHROMIE_ACTIVE_PROFILE must be generated}
      CHROMIE_RUNTIME_ENV_FINGERPRINT: ${CHROMIE_RUNTIME_ENV_FINGERPRINT:?CHROMIE_RUNTIME_ENV_FINGERPRINT must be generated}
      ASR_HOST: "0.0.0.0"
      ASR_PORT: "9001"
      ASR_MODE: ${ASR_MODE:-final}
      ASR_MODEL: ${ASR_MODEL}
      ASR_MODEL_REVISION: ${ASR_MODEL_REVISION}
      ASR_DEVICE: ${ASR_DEVICE}
      ASR_LANGUAGE: ${ASR_LANGUAGE:-}
      ASR_SAMPLE_RATE: ${ASR_SAMPLE_RATE:-16000}
      ASR_MAX_CONCURRENT_TRANSCRIPTIONS: ${ASR_MAX_CONCURRENT_TRANSCRIPTIONS:-1}
      ASR_STARTUP_WARMUP_ENABLED: ${ASR_STARTUP_WARMUP_ENABLED:-true}
      ASR_STARTUP_WARMUP_AUDIO_SECONDS: ${ASR_STARTUP_WARMUP_AUDIO_SECONDS:-1.0}

      SHERPA_ONNX_MODEL_TYPE: ${SHERPA_ONNX_MODEL_TYPE:-sense_voice}
      SHERPA_ONNX_PROVIDER: ${SHERPA_ONNX_PROVIDER:-cuda}
      SHERPA_ONNX_NUM_THREADS: ${SHERPA_ONNX_NUM_THREADS:-2}
      SHERPA_ONNX_LANGUAGE: ${SHERPA_ONNX_LANGUAGE:-auto}
      SHERPA_ONNX_USE_ITN: ${SHERPA_ONNX_USE_ITN:-true}
      SHERPA_ONNX_DEBUG: ${SHERPA_ONNX_DEBUG:-false}
      SHERPA_ONNX_MODEL_FILE: ${SHERPA_ONNX_MODEL_FILE:-}
      SHERPA_ONNX_TOKENS_FILE: ${SHERPA_ONNX_TOKENS_FILE:-}

      NVIDIA_VISIBLE_DEVICES: ${NVIDIA_VISIBLE_DEVICES:-all}
      NVIDIA_DRIVER_CAPABILITIES: ${NVIDIA_DRIVER_CAPABILITIES:-compute,utility}

      HF_HOME: /root/.cache/huggingface
      HUGGINGFACE_HUB_CACHE: /root/.cache/huggingface
      HF_HUB_OFFLINE: ${HF_HUB_OFFLINE:-0}
      TRANSFORMERS_OFFLINE: ${TRANSFORMERS_OFFLINE:-0}
      HF_HUB_DISABLE_TELEMETRY: "1"

      HTTP_PROXY: ${HTTP_PROXY:-}
      HTTPS_PROXY: ${HTTPS_PROXY:-}
      http_proxy: ${HTTP_PROXY:-}
      https_proxy: ${HTTPS_PROXY:-}
      NO_PROXY: ${NO_PROXY:-localhost,127.0.0.1,host.docker.internal,chromie-asr,chromie-tts,chromie-llm,chromie-router,chromie-agent}
      no_proxy: ${NO_PROXY:-localhost,127.0.0.1,host.docker.internal,chromie-asr,chromie-tts,chromie-llm,chromie-router,chromie-agent}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./hf_cache:/root/.cache/huggingface
    networks:
      - chromie-net
    healthcheck:
      test:
        - CMD-SHELL
        - |
          python - <<'PY'
          import asyncio, json, websockets

          async def main():
              async with websockets.connect("ws://127.0.0.1:9001", open_timeout=5) as ws:
                  await ws.send(json.dumps({"type": "health"}))
                  msg = await asyncio.wait_for(ws.recv(), timeout=5)
                  assert json.loads(msg).get("type") == "pong"

          asyncio.run(main())
          PY
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s

  chromie-tts:
    container_name: chromie-tts
    build:
      context: ./tts
      args:
        TTS_CUDA_IMAGE: ${TTS_CUDA_IMAGE}
        TTS_CUDA_ARCH: ${TTS_CUDA_ARCH}
        CHROMIE_BUILD_PROFILE: ${CHROMIE_ACTIVE_PROFILE:?CHROMIE_ACTIVE_PROFILE must be generated}
        PYTORCH_INDEX_URL: ${PYTORCH_INDEX_URL:-https://download.pytorch.org/whl/cu128}
        HTTP_PROXY: ${HTTP_PROXY:-}
        HTTPS_PROXY: ${HTTPS_PROXY:-}
        http_proxy: ${HTTP_PROXY:-}
        https_proxy: ${HTTPS_PROXY:-}
        NO_PROXY: ${NO_PROXY:-localhost,127.0.0.1,host.docker.internal}
        no_proxy: ${NO_PROXY:-localhost,127.0.0.1,host.docker.internal}
    image: chromie-tts:${CHROMIE_IMAGE_TAG:?CHROMIE_IMAGE_TAG must be set}
    init: true
    restart: unless-stopped
    gpus: all
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    ports:
      - "5000:5000"
    environment:
      CHROMIE_ACTIVE_PROFILE: ${CHROMIE_ACTIVE_PROFILE:?CHROMIE_ACTIVE_PROFILE must be generated}
      CHROMIE_RUNTIME_ENV_FINGERPRINT: ${CHROMIE_RUNTIME_ENV_FINGERPRINT:?CHROMIE_RUNTIME_ENV_FINGERPRINT must be generated}
      TTS_CUDA_ARCH: ${TTS_CUDA_ARCH:?TTS_CUDA_ARCH must come from the detected profile}
      TTS_HOST: "0.0.0.0"
      TTS_PORT: "5000"
      TTS_PROVIDER: ${TTS_PROVIDER:-oute}
      TTS_MODEL_SIZE: ${TTS_MODEL_SIZE}
      TTS_TOKENIZER_REPO: ${TTS_TOKENIZER_REPO}
      TTS_TOKENIZER_REVISION: ${TTS_TOKENIZER_REVISION}
      TTS_GGUF_REPO: ${TTS_GGUF_REPO}
      TTS_GGUF_REVISION: ${TTS_GGUF_REVISION}
      TTS_QUANTIZATION: ${TTS_QUANTIZATION}
      TTS_N_GPU_LAYERS: ${TTS_N_GPU_LAYERS}
      TTS_CONTEXT_SIZE: ${TTS_CONTEXT_SIZE}
      TTS_MAX_LENGTH: ${TTS_MAX_LENGTH}
      TTS_N_BATCH: ${TTS_N_BATCH}
      TTS_THREADS: ${TTS_THREADS}
      TTS_SAMPLE_RATE: ${TTS_SAMPLE_RATE}
      TTS_CHUNK_MS: ${TTS_CHUNK_MS}

      TTS_MAX_CONCURRENT_SYNTHESIS: ${TTS_MAX_CONCURRENT_SYNTHESIS:-1}
      TTS_WORKER_COUNT: ${TTS_WORKER_COUNT:-1}
      TTS_TEMPERATURE: ${TTS_TEMPERATURE:-0.4}
      TTS_REPETITION_PENALTY: ${TTS_REPETITION_PENALTY:-1.1}
      TTS_MIN_TEXT_CHARS: ${TTS_MIN_TEXT_CHARS:-1}
      TTS_MAX_TEXT_CHARS: ${TTS_MAX_TEXT_CHARS:-220}
      TTS_GENERATION_RETRIES: ${TTS_GENERATION_RETRIES:-1}
      TTS_RESET_LLAMA_STATE: ${TTS_RESET_LLAMA_STATE:-0}
      TTS_AUDIO_CODEC_DEVICE: ${TTS_AUDIO_CODEC_DEVICE:-auto}
      TTS_DETAILED_TIMING: ${TTS_DETAILED_TIMING:-1}
      TTS_METRICS_WINDOW: ${TTS_METRICS_WINDOW:-20}
      TTS_WORKER_STARTUP_TIMEOUT_SEC: ${TTS_WORKER_STARTUP_TIMEOUT_SEC:-600}
      TTS_SPEAKER_ALIGNMENT_DEVICE: ${TTS_SPEAKER_ALIGNMENT_DEVICE:-cpu}
      TTS_SPEAKER_TRANSCRIPT_MIN_SIMILARITY: ${TTS_SPEAKER_TRANSCRIPT_MIN_SIMILARITY:-0.75}

      PYTORCH_CUDA_ALLOC_CONF: ${PYTORCH_CUDA_ALLOC_CONF:-expandable_segments:True}
      NVIDIA_VISIBLE_DEVICES: ${NVIDIA_VISIBLE_DEVICES:-all}
      NVIDIA_DRIVER_CAPABILITIES: ${NVIDIA_DRIVER_CAPABILITIES:-compute,utility}
      GGML_CUDA_DISABLE_GRAPHS: ${GGML_CUDA_DISABLE_GRAPHS:-0}
      TOKENIZERS_PARALLELISM: "false"

      SPEAKER_DIR: /app/speakers
      HF_HOME: /root/.cache/huggingface
      HUGGINGFACE_HUB_CACHE: /root/.cache/huggingface
      HF_HUB_OFFLINE: ${HF_HUB_OFFLINE:-0}
      TRANSFORMERS_OFFLINE: ${TRANSFORMERS_OFFLINE:-0}
      HF_HUB_DISABLE_TELEMETRY: "1"

      HTTP_PROXY: ${HTTP_PROXY:-}
      HTTPS_PROXY: ${HTTPS_PROXY:-}
      http_proxy: ${HTTP_PROXY:-}
      https_proxy: ${HTTPS_PROXY:-}
      NO_PROXY: ${NO_PROXY:-localhost,127.0.0.1,host.docker.internal,chromie-asr,chromie-tts,chromie-llm,chromie-router,chromie-agent}
      no_proxy: ${NO_PROXY:-localhost,127.0.0.1,host.docker.internal,chromie-asr,chromie-tts,chromie-llm,chromie-router,chromie-agent}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./hf_cache:/root/.cache/huggingface
      - ./hf_cache/outeai:/root/.cache/outeai
      - ./hf_cache/whisper:/root/.cache/whisper
      - ./tts/speakers:/app/speakers
    networks:
      - chromie-net
    healthcheck:
      test:
        - CMD-SHELL
        - |
          python - <<'PY'
          import asyncio, json, websockets

          async def main():
              async with websockets.connect("ws://127.0.0.1:5000", open_timeout=5) as ws:
                  await ws.send(json.dumps({"type": "health"}))
                  msg = await asyncio.wait_for(ws.recv(), timeout=5)
                  assert json.loads(msg).get("type") == "pong"

          asyncio.run(main())
          PY
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 180s

  chromie-tts-cosyvoice:
    profiles: ["tts-evaluation"]
    container_name: chromie-tts-cosyvoice
    build:
      context: .
      dockerfile: tts_candidates/cosyvoice/Dockerfile
      args:
        CUDA_IMAGE: ${TTS_CANDIDATE_CUDA_IMAGE:-nvidia/cuda:12.8.1-cudnn-runtime-ubuntu22.04}
        COSYVOICE3_SOURCE_REVISION: ${COSYVOICE3_SOURCE_REVISION:-074ca6dc9e80a2f424f1f74b48bdd7d3fea531cc}
    image: chromie-tts-cosyvoice:${CHROMIE_IMAGE_TAG:?CHROMIE_IMAGE_TAG must be set}
    init: true
    restart: unless-stopped
    gpus: all
    ports:
      - "5001:5000"
    environment:
      TTS_HOST: "0.0.0.0"
      TTS_PORT: "5000"
      TTS_REFERENCE_WAV: /evaluation/reference.wav
      TTS_REFERENCE_METADATA: /evaluation/reference.json
      TTS_WORKER_STARTUP_TIMEOUT_SEC: ${TTS_CANDIDATE_STARTUP_TIMEOUT_SEC:-1200}
      COSYVOICE3_SOURCE_REVISION: ${COSYVOICE3_SOURCE_REVISION:-074ca6dc9e80a2f424f1f74b48bdd7d3fea531cc}
      COSYVOICE3_MODEL_ID: ${COSYVOICE3_MODEL_ID:-FunAudioLLM/Fun-CosyVoice3-0.5B-2512}
      COSYVOICE3_MODEL_REVISION: ${COSYVOICE3_MODEL_REVISION:-29e01c4e8d000f4bcd70751be16fa94bf3d85a18}
      COSYVOICE3_FP16: ${COSYVOICE3_FP16:-1}
      HF_HOME: /root/.cache/huggingface
      HUGGINGFACE_HUB_CACHE: /root/.cache/huggingface
      HF_HUB_OFFLINE: ${HF_HUB_OFFLINE:-0}
      TRANSFORMERS_OFFLINE: ${TRANSFORMERS_OFFLINE:-0}
      NVIDIA_VISIBLE_DEVICES: ${NVIDIA_VISIBLE_DEVICES:-all}
      NVIDIA_DRIVER_CAPABILITIES: ${NVIDIA_DRIVER_CAPABILITIES:-compute,utility}
      HTTP_PROXY: ${HTTP_PROXY:-}
      HTTPS_PROXY: ${HTTPS_PROXY:-}
      NO_PROXY: ${NO_PROXY:-localhost,127.0.0.1,host.docker.internal}
    volumes:
      - ./hf_cache:/root/.cache/huggingface
      - ${TTS_AB_REFERENCE_DIR:-./.chromie/evidence/tts-provider-ab/reference}:/evaluation:ro
    networks:
      - chromie-net
    healthcheck:
      test:
        - CMD-SHELL
        - |
          python - <<'PY'
          import asyncio, json, websockets

          async def main():
              async with websockets.connect("ws://127.0.0.1:5000", open_timeout=5) as ws:
                  await ws.send(json.dumps({"type": "health"}))
                  message = await asyncio.wait_for(ws.recv(), timeout=5)
                  assert json.loads(message).get("type") == "pong"

          asyncio.run(main())
          PY
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 1200s

  chromie-tts-qwen3:
    profiles: ["tts-evaluation"]
    container_name: chromie-tts-qwen3
    build:
      context: .
      dockerfile: tts_candidates/qwen3/Dockerfile
      args:
        CUDA_IMAGE: ${TTS_CANDIDATE_CUDA_IMAGE:-nvidia/cuda:12.8.1-cudnn-runtime-ubuntu22.04}
        QWEN3_TTS_SOURCE_REVISION: ${QWEN3_TTS_SOURCE_REVISION:-022e286b98fbec7e1e916cb940cdf532cd9f488e}
        PYTORCH_INDEX_URL: ${PYTORCH_INDEX_URL:-https://download.pytorch.org/whl/cu128}
    image: chromie-tts-qwen3:${CHROMIE_IMAGE_TAG:?CHROMIE_IMAGE_TAG must be set}
    init: true
    restart: unless-stopped
    gpus: all
    ports:
      - "5002:5000"
    environment:
      TTS_HOST: "0.0.0.0"
      TTS_PORT: "5000"
      TTS_REFERENCE_WAV: /evaluation/reference.wav
      TTS_REFERENCE_METADATA: /evaluation/reference.json
      TTS_WORKER_STARTUP_TIMEOUT_SEC: ${TTS_CANDIDATE_STARTUP_TIMEOUT_SEC:-1200}
      QWEN3_TTS_SOURCE_REVISION: ${QWEN3_TTS_SOURCE_REVISION:-022e286b98fbec7e1e916cb940cdf532cd9f488e}
      QWEN3_TTS_MODEL_ID: ${QWEN3_TTS_MODEL_ID:-Qwen/Qwen3-TTS-12Hz-0.6B-Base}
      QWEN3_TTS_MODEL_REVISION: ${QWEN3_TTS_MODEL_REVISION:-5d83992436eae1d760afd27aff78a71d676296fc}
      QWEN3_TTS_DEVICE: ${QWEN3_TTS_DEVICE:-cuda:0}
      QWEN3_TTS_DTYPE: ${QWEN3_TTS_DTYPE:-bfloat16}
      QWEN3_TTS_ATTENTION: ${QWEN3_TTS_ATTENTION:-sdpa}
      HF_HOME: /root/.cache/huggingface
      HUGGINGFACE_HUB_CACHE: /root/.cache/huggingface
      HF_HUB_OFFLINE: ${HF_HUB_OFFLINE:-0}
      TRANSFORMERS_OFFLINE: ${TRANSFORMERS_OFFLINE:-0}
      NVIDIA_VISIBLE_DEVICES: ${NVIDIA_VISIBLE_DEVICES:-all}
      NVIDIA_DRIVER_CAPABILITIES: ${NVIDIA_DRIVER_CAPABILITIES:-compute,utility}
      HTTP_PROXY: ${HTTP_PROXY:-}
      HTTPS_PROXY: ${HTTPS_PROXY:-}
      NO_PROXY: ${NO_PROXY:-localhost,127.0.0.1,host.docker.internal}
    volumes:
      - ./hf_cache:/root/.cache/huggingface
      - ${TTS_AB_REFERENCE_DIR:-./.chromie/evidence/tts-provider-ab/reference}:/evaluation:ro
    networks:
      - chromie-net
    healthcheck:
      test:
        - CMD-SHELL
        - |
          python - <<'PY'
          import asyncio, json, websockets

          async def main():
              async with websockets.connect("ws://127.0.0.1:5000", open_timeout=5) as ws:
                  await ws.send(json.dumps({"type": "health"}))
                  message = await asyncio.wait_for(ws.recv(), timeout=5)
                  assert json.loads(message).get("type") == "pong"

          asyncio.run(main())
          PY
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 1200s

  chromie-llm:
    container_name: chromie-llm
    image: ${OLLAMA_IMAGE:?OLLAMA_IMAGE must be set}
    init: true
    restart: unless-stopped
    gpus: all
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    ports:
      - "11434:11434"
    environment:
      CHROMIE_ACTIVE_PROFILE: ${CHROMIE_ACTIVE_PROFILE:?CHROMIE_ACTIVE_PROFILE must be generated}
      CHROMIE_RUNTIME_ENV_FINGERPRINT: ${CHROMIE_RUNTIME_ENV_FINGERPRINT:?CHROMIE_RUNTIME_ENV_FINGERPRINT must be generated}
      OLLAMA_HOST: "0.0.0.0:11434"
      OLLAMA_KEEP_ALIVE: ${OLLAMA_KEEP_ALIVE:-24h}
      OLLAMA_LOAD_TIMEOUT: ${OLLAMA_LOAD_TIMEOUT:-10m}
      OLLAMA_MAX_LOADED_MODELS: ${OLLAMA_MAX_LOADED_MODELS:-2}
      OLLAMA_NUM_PARALLEL: ${OLLAMA_NUM_PARALLEL:-1}
      OLLAMA_CONTEXT_LENGTH: ${OLLAMA_CONTEXT_LENGTH:-2048}

      NVIDIA_VISIBLE_DEVICES: ${NVIDIA_VISIBLE_DEVICES:-all}
      NVIDIA_DRIVER_CAPABILITIES: ${NVIDIA_DRIVER_CAPABILITIES:-compute,utility}

      HTTP_PROXY: ${HTTP_PROXY:-}
      HTTPS_PROXY: ${HTTPS_PROXY:-}
      http_proxy: ${HTTP_PROXY:-}
      https_proxy: ${HTTPS_PROXY:-}
      NO_PROXY: ${NO_PROXY:-localhost,127.0.0.1,host.docker.internal,chromie-asr,chromie-tts,chromie-llm,chromie-router,chromie-agent}
      no_proxy: ${NO_PROXY:-localhost,127.0.0.1,host.docker.internal,chromie-asr,chromie-tts,chromie-llm,chromie-router,chromie-agent}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ${OLLAMA_DATA_DIR:-./ollama_data}:/root/.ollama
    networks:
      - chromie-net
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "OLLAMA_HOST=http://127.0.0.1:11434 ollama list >/dev/null",
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  chromie-router:
    container_name: chromie-router
    build:
      context: .
      dockerfile: router/Dockerfile
      args:
        PYTHON_IMAGE: ${PYTHON_IMAGE:-python:3.12.10-slim-bookworm}
        HTTP_PROXY: ${HTTP_PROXY:-}
        HTTPS_PROXY: ${HTTPS_PROXY:-}
        http_proxy: ${HTTP_PROXY:-}
        https_proxy: ${HTTPS_PROXY:-}
        NO_PROXY: ${NO_PROXY:-localhost,127.0.0.1,host.docker.internal}
        no_proxy: ${NO_PROXY:-localhost,127.0.0.1,host.docker.internal}
    image: chromie-router:${CHROMIE_IMAGE_TAG:?CHROMIE_IMAGE_TAG must be set}
    init: true
    restart: unless-stopped
    ports:
      - "8091:8091"
    environment:
      CHROMIE_ACTIVE_PROFILE: ${CHROMIE_ACTIVE_PROFILE:?CHROMIE_ACTIVE_PROFILE must be generated}
      CHROMIE_RUNTIME_ENV_FINGERPRINT: ${CHROMIE_RUNTIME_ENV_FINGERPRINT:?CHROMIE_RUNTIME_ENV_FINGERPRINT must be generated}
      ROUTER_HOST: "0.0.0.0"
      ROUTER_PORT: "8091"
      ROUTER_MODE: ${ROUTER_MODE:-}
      ROUTER_USE_LLM: ${ROUTER_USE_LLM:-1}
      ROUTER_OLLAMA_URL: http://chromie-llm:11434
      ROUTER_MODEL: ${ROUTER_MODEL:-qwen3:4b}
      ROUTER_REVIEW_MODEL: ${ROUTER_REVIEW_MODEL:-gemma4:e2b}
      ROUTER_TIMEOUT_MS: ${ROUTER_TIMEOUT_MS:-5400}
      ROUTER_LLM_TIMEOUT_MS: ${ROUTER_LLM_TIMEOUT_MS:-5400}
      ROUTER_LLM_NUM_CTX: ${ROUTER_LLM_NUM_CTX:-4096}
      ROUTER_LLM_NUM_PREDICT: ${ROUTER_LLM_NUM_PREDICT:-512}
      ROUTER_LLM_KEEP_ALIVE: ${ROUTER_LLM_KEEP_ALIVE:-24h}
      ROUTER_WARM_LLM_ON_STARTUP: ${ROUTER_WARM_LLM_ON_STARTUP:-1}
      ROUTER_WARM_LLM_TIMEOUT_MS: ${ROUTER_WARM_LLM_TIMEOUT_MS:-60000}
      ROUTER_REVIEW_TIMEOUT_MS: ${ROUTER_REVIEW_TIMEOUT_MS:-2500}
      ROUTER_CONFIDENCE_THRESHOLD: ${ROUTER_CONFIDENCE_THRESHOLD:-0.55}
      ROUTER_CAPABILITY_CATALOG_URL: ${ROUTER_CAPABILITY_CATALOG_URL:?Set ROUTER_CAPABILITY_CATALOG_URL}
      ROUTER_CAPABILITY_CATALOG_TIMEOUT_MS: ${ROUTER_CAPABILITY_CATALOG_TIMEOUT_MS:?Set ROUTER_CAPABILITY_CATALOG_TIMEOUT_MS}
      ROUTER_CAPABILITY_CATALOG_CACHE_TTL_MS: ${ROUTER_CAPABILITY_CATALOG_CACHE_TTL_MS:-5000}
      ROUTER_CAPABILITY_MATCH_LIMIT: ${ROUTER_CAPABILITY_MATCH_LIMIT:?Set ROUTER_CAPABILITY_MATCH_LIMIT}
      ROUTER_POST_INTERRUPT_REVIEW_ENABLED: ${ROUTER_POST_INTERRUPT_REVIEW_ENABLED:-0}
      ROUTER_SLOW_REVIEW_RECOVERY_ENABLED: ${ROUTER_SLOW_REVIEW_RECOVERY_ENABLED:-1}
      ROUTER_GENERIC_CHAT_REVIEW_ENABLED: ${ROUTER_GENERIC_CHAT_REVIEW_ENABLED:-1}
      ROUTER_TOOL_FAST_SPEECH_REPAIR_ENABLED: ${ROUTER_TOOL_FAST_SPEECH_REPAIR_ENABLED:-0}
      ROUTER_LOG_LEVEL: ${ROUTER_LOG_LEVEL:-${LOG_LEVEL:-INFO}}
      CHROMIE_ROUTER_DEBUG_RAW: ${CHROMIE_ROUTER_DEBUG_RAW:-0}
      CHROMIE_ROUTER_DEBUG_PROMPT: ${CHROMIE_ROUTER_DEBUG_PROMPT:-0}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}

      HTTP_PROXY: ${HTTP_PROXY:-}
      HTTPS_PROXY: ${HTTPS_PROXY:-}
      http_proxy: ${HTTP_PROXY:-}
      https_proxy: ${HTTPS_PROXY:-}
      NO_PROXY: ${NO_PROXY:-localhost,127.0.0.1,host.docker.internal,chromie-asr,chromie-tts,chromie-llm,chromie-router,chromie-agent}
      no_proxy: ${NO_PROXY:-localhost,127.0.0.1,host.docker.internal,chromie-asr,chromie-tts,chromie-llm,chromie-router,chromie-agent}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      chromie-llm:
        condition: service_healthy
      chromie-agent:
        condition: service_healthy
    networks:
      - chromie-net
    healthcheck:
      test:
        - CMD-SHELL
        - |
          python - <<'PY'
          import urllib.request
          urllib.request.urlopen("http://127.0.0.1:8091/health", timeout=5).read()
          PY
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s

  chromie-agent:
    container_name: chromie-agent
    build:
      context: .
      dockerfile: agent/Dockerfile
      args:
        PYTHON_IMAGE: ${PYTHON_IMAGE:-python:3.12.10-slim-bookworm}
        HTTP_PROXY: ${HTTP_PROXY:-}
        HTTPS_PROXY: ${HTTPS_PROXY:-}
        http_proxy: ${HTTP_PROXY:-}
