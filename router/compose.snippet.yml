  chromie-router:
    container_name: chromie-router
    build:
      context: ./router
    image: chromie-router:latest
    init: true
    restart: unless-stopped
    environment:
      ROUTER_HOST: "0.0.0.0"
      ROUTER_PORT: "8091"
      ROUTER_MODE: ${ROUTER_MODE:-hybrid}
      ROUTER_RULES_FIRST: ${ROUTER_RULES_FIRST:-1}
      ROUTER_OLLAMA_URL: ${ROUTER_OLLAMA_URL:-http://chromie-llm:11434}
      ROUTER_MODEL: ${ROUTER_MODEL:-qwen3:0.6b}
      ROUTER_TIMEOUT_MS: ${ROUTER_TIMEOUT_MS:-800}
      ROUTER_LLM_TIMEOUT_MS: ${ROUTER_LLM_TIMEOUT_MS:-800}
      ROUTER_CONFIDENCE_THRESHOLD: ${ROUTER_CONFIDENCE_THRESHOLD:-0.55}
      ROUTER_LOG_LEVEL: ${ROUTER_LOG_LEVEL:-INFO}
      HTTP_PROXY: ${HTTP_PROXY:-}
      HTTPS_PROXY: ${HTTPS_PROXY:-}
      http_proxy: ${HTTP_PROXY:-}
      https_proxy: ${HTTPS_PROXY:-}
      NO_PROXY: ${NO_PROXY:-localhost,127.0.0.1,chromie-asr,chromie-tts,chromie-llm,chromie-router,host.docker.internal}
      no_proxy: ${NO_PROXY:-localhost,127.0.0.1,chromie-asr,chromie-tts,chromie-llm,chromie-router,host.docker.internal}
    ports:
      - "${ROUTER_PORT:-8091}:8091"
    depends_on:
      - chromie-llm
    networks:
      - chromie-net
    healthcheck:
      test: ["CMD-SHELL", "python - <<'PY'
import urllib.request
urllib.request.urlopen('http://127.0.0.1:8091/health', timeout=3).read()
PY"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 10s
